name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate CloudSyncSecrets.cs
        shell: pwsh
        run: |
          $lines = @(
            'namespace QuickPanel.Services.CloudSync;'
            ''
            'public static partial class CloudSyncConstants'
            '{'
            "    public const string GoogleClientId = ""${{ secrets.GOOGLE_CLIENT_ID }}"";"
            "    public const string GoogleClientSecret = ""${{ secrets.GOOGLE_CLIENT_SECRET }}"";"
            "    public const string MicrosoftClientId = ""${{ secrets.MICROSOFT_CLIENT_ID }}"";"
            '}'
          )
          $lines | Set-Content Services\CloudSync\CloudSyncSecrets.cs

      - name: Publish (portable, self-contained)
        run: dotnet publish QuickPanel.csproj -c Release -r win-x64 --self-contained true -o publish /p:PublishSingleFile=true

      - name: Remove debug symbols
        run: Remove-Item -Path "publish\*.pdb" -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Zip portable artifact
        run: Compress-Archive -Path "publish\*" -DestinationPath "QuickPanel-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Sync installer.iss version with the tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $pattern = '#define MyAppVersion "[^"]*"'
          $replacement = '#define MyAppVersion "' + $version + '"'
          (Get-Content installer.iss) -replace $pattern, $replacement | Set-Content installer.iss

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QuickPanel-${{ github.ref_name }}.zip
            installer-output\QuickPanelSetup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
